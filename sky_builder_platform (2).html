                        { title: 'Klik WhatsApp CTA', val: '3,210', diff: '+22%', up: true, icon: 'ph-whatsapp-logo' },
                        { title: 'Klik Katalog Produk', val: '4,500', diff: '+5%', up: true, icon: 'ph-storefront' },
                        { title: 'Klik Link Sosial Media', val: '890', diff: '-2%', up: false, icon: 'ph-link' },
                    ].map((s,i) => (
                        <Card key={i} className="flex flex-col justify-between border-gray-200 shadow-sm">
                            <div className="flex justify-between items-start mb-4">
                                <div className="w-10 h-10 rounded-lg bg-gray-100 text-gray-600 flex items-center justify-center text-xl"><i className={`ph ${s.icon}`}></i></div>
                                <span className={`text-xs font-bold px-2 py-1 rounded-md flex items-center gap-1 ${s.up ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                    {s.up ? <i className="ph ph-trend-up"></i> : <i className="ph ph-trend-down"></i>} {s.diff}
                                </span>
                            </div>
                            <h3 className="text-3xl font-black text-skydark mb-1">{s.val}</h3>
                            <p className="text-xs font-bold text-gray-400 uppercase tracking-wider">{s.title}</p>
                        </Card>
                    ))}
                </div>

                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <Card className="lg:col-span-2 border-gray-200 shadow-sm flex flex-col">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-bold text-lg">Trend Pengunjung (14 Hari)</h3>
                            <Button variant="outline" className="py-1.5 px-3 text-xs">Export CSV</Button>
                        </div>
                        {/* Simulation line chart area */}
                        <div className="flex-1 bg-gray-50 rounded-xl border border-gray-100 flex items-center justify-center min-h-[250px] relative overflow-hidden p-4">
                             {/* Simple SVG Chart line mockup */}
                             <svg className="w-full h-full text-skyblue opacity-50" preserveAspectRatio="none" viewBox="0 0 100 100">
                                 <polyline fill="none" stroke="currentColor" strokeWidth="2" points="0,80 10,60 20,70 30,40 40,50 50,20 60,30 70,10 80,40 90,20 100,5" />
                                 <polygon fill="currentColor" fillOpacity="0.1" points="0,100 0,80 10,60 20,70 30,40 40,50 50,20 60,30 70,10 80,40 90,20 100,5 100,100" />
                             </svg>
                             <div className="absolute inset-0 flex items-end justify-between px-6 pb-2 text-[10px] text-gray-400 font-bold">
                                 <span>1 Jun</span>
                                 <span>7 Jun</span>
                                 <span>14 Jun</span>
                             </div>
                        </div>
                    </Card>
                    <div className="space-y-6">
                        <Card className="border-gray-200 shadow-sm">
                            <h3 className="font-bold text-lg mb-4">Device Pengunjung</h3>
                            <div className="space-y-4">
                                <div>
                                    <div className="flex justify-between text-sm mb-1 font-medium"><span className="flex items-center gap-2"><i className="ph ph-device-mobile text-gray-400"></i> Mobile (HP)</span> <span className="font-bold">85%</span></div>
                                    <div className="w-full bg-gray-100 h-2 rounded-full overflow-hidden"><div className="bg-skyblue w-[85%] h-full rounded-full"></div></div>
                                </div>
                                <div>
                                    <div className="flex justify-between text-sm mb-1 font-medium"><span className="flex items-center gap-2"><i className="ph ph-desktop text-gray-400"></i> Desktop</span> <span className="font-bold">12%</span></div>
                                    <div className="w-full bg-gray-100 h-2 rounded-full overflow-hidden"><div className="bg-skycyan w-[12%] h-full rounded-full"></div></div>
                                </div>
                                <div>
                                    <div className="flex justify-between text-sm mb-1 font-medium"><span className="flex items-center gap-2"><i className="ph ph-device-tablet text-gray-400"></i> Tablet</span> <span className="font-bold">3%</span></div>
                                    <div className="w-full bg-gray-100 h-2 rounded-full overflow-hidden"><div className="bg-skypurple w-[3%] h-full rounded-full"></div></div>
                                </div>
                            </div>
                        </Card>
                        <Card className="border-gray-200 shadow-sm">
                            <h3 className="font-bold text-lg mb-4">Sumber Traffic</h3>
                            <div className="space-y-3">
                                {['Instagram Link Bio', 'Direct / WhatsApp', 'TikTok Profil', 'Google Search'].map((src, i) => (
                                    <div key={i} className="flex justify-between items-center text-sm p-2 bg-gray-50 rounded-lg border border-gray-100">
                                        <span className="font-medium text-gray-700">{src}</span>
                                        <span className="font-bold text-skydark">{Math.floor(1000 / (i+1))}</span>
                                    </div>
                                ))}
                            </div>
                        </Card>
                    </div>
                </div>
            </div>
        );

        const AdminDashboard = () => (
            <div className="p-4 md:p-8 max-w-7xl mx-auto space-y-6 animate-slide-up">
                <div className="mb-6 flex items-center gap-3">
                    <div className="w-12 h-12 bg-skydark text-white rounded-xl flex items-center justify-center text-2xl shadow-lg"><i className="ph ph-shield-star"></i></div>
                    <div>
                        <h2 className="text-2xl font-black text-skydark">Admin Control Panel</h2>
                        <p className="text-gray-500 text-sm">Kelola seluruh platform Sky Builder.</p>
                    </div>
                </div>

                <div className="grid md:grid-cols-3 gap-6">
                    <Card className="border-2 border-gray-200">
                        <h3 className="font-bold text-lg mb-4">Ringkasan Platform</h3>
                        <div className="space-y-3">
                            <div className="flex justify-between border-b border-gray-100 pb-2"><span className="text-gray-500">Total User</span> <span className="font-bold">12,450</span></div>
                            <div className="flex justify-between border-b border-gray-100 pb-2"><span className="text-gray-500">Total Halaman Aktif</span> <span className="font-bold">34,120</span></div>
                            <div className="flex justify-between"><span className="text-gray-500">Total Produk di Catalog</span> <span className="font-bold">89,500</span></div>
                        </div>
                    </Card>
                    
                    <div className="md:col-span-2 grid grid-cols-2 gap-4 content-start">
                        {[
                            { name: 'Kelola User', icon: 'ph-users', color: 'text-blue-500' },
                            { name: 'Kelola Template', icon: 'ph-swatches', color: 'text-purple-500' },
                            { name: 'Paket Harga', icon: 'ph-tag', color: 'text-green-500' },
                            { name: 'Halaman Publik', icon: 'ph-globe', color: 'text-orange-500' },
                        ].map((menu, i) => (
                            <button key={i} className="p-4 bg-white border border-gray-200 rounded-xl hover:border-skydark hover:shadow-md transition-all flex items-center gap-4 text-left group">
                                <div className={`w-12 h-12 rounded-lg bg-gray-50 flex items-center justify-center text-2xl ${menu.color} group-hover:bg-skydark group-hover:text-white transition-colors`}><i className={`ph ${menu.icon}`}></i></div>
                                <span className="font-bold">{menu.name}</span>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );

        // --- MAIN APP (State Machine & Routing) ---
        const App = () => {
            const [view, setView] = useState('landing'); // 'landing', 'dashboard', 'builder-wizard', 'pages', 'catalog', 'analytics', 'admin-dashboard'
            const [userRole, setUserRole] = useState('user'); // 'user' or 'admin'

            useEffect(() => {
                window.scrollTo(0, 0);
                // Listen to custom navigate event from deeply nested components (like EmptyState buttons)
                const handleNavigate = (e) => setView(e.detail);
                window.addEventListener('navigate', handleNavigate);
                return () => window.removeEventListener('navigate', handleNavigate);
            }, [view]);

            const navigate = (newView) => setView(newView);
            const toggleRole = () => setUserRole(prev => prev === 'user' ? 'admin' : 'user');

            // --- Landing Page View ---
            if (view === 'landing') {
                return (
                    <div className="font-sans text-skydark bg-white selection:bg-skyblue selection:text-white">
                        {/* Navbar */}
                        <nav className="fixed w-full z-50 bg-white/90 backdrop-blur-xl border-b border-gray-100 transition-all duration-300">
                            <div className="container mx-auto px-6 h-20 flex items-center justify-between max-w-7xl">
                                <div className="flex items-center gap-2 font-black text-2xl tracking-tight cursor-pointer" onClick={() => window.scrollTo({top:0, behavior:'smooth'})}>
                                    <i className="ph ph-squares-four text-skyblue text-3xl"></i>
                                    Sky Builder
                                </div>
                                <div className="hidden md:flex items-center gap-8 font-bold text-sm text-gray-600">
                                    <a href="#" className="hover:text-skyblue transition-colors">Beranda</a>
                                    <a href="#templates" className="hover:text-skyblue transition-colors">Template</a>
                                    <a href="#harga" className="hover:text-skyblue transition-colors">Harga</a>
                                    <a href="#faq" className="hover:text-skyblue transition-colors">FAQ</a>
                                </div>
                                <div className="hidden md:flex items-center gap-4">
                                    <button onClick={() => navigate('dashboard')} className="font-bold text-sm text-gray-600 hover:text-skydark px-4 py-2">Masuk</button>
                                    <Button onClick={() => navigate('dashboard')} className="py-2.5 px-6 shadow-md shadow-blue-500/20 text-sm">Mulai Gratis</Button>
                                </div>
                                <button className="md:hidden w-10 h-10 flex items-center justify-center bg-gray-50 rounded-lg text-xl border border-gray-200"><i className="ph ph-list"></i></button>
                            </div>
                        </nav>

                        <HeroSection onGetStarted={() => navigate('dashboard')} />
                        <ProblemSolutionSection />
                        <FeaturesSection />
                        <InteractiveShowcase />
                        <TemplatesSection />
                        <StepsSection />
                        <PricingSection />
                        <FAQSection />
                        <Footer />
                    </div>
                );
            }

            // --- Dashboard Views ---
            const getDashboardTitle = () => {
                switch(view) {
                    case 'dashboard': return 'Dashboard Overview';
                    case 'pages': return 'Halaman Saya';
                    case 'builder-wizard': return 'Sky Editor / Buat Halaman';
                    case 'catalog': return 'Sky Catalog';
                    case 'analytics': return 'Sky Analytics';
                    case 'settings': return 'Pengaturan Profil';
                    case 'admin-dashboard': return 'Admin Control Panel';
                    default: return 'Dashboard';
                }
            };

            return (
                <div className="bg-[#f1f5f9] min-h-screen pb-20 md:pb-0 font-sans text-skydark selection:bg-skyblue selection:text-white flex">
                    <Sidebar activePath={view} navigate={navigate} userRole={userRole} />
                    
                    <div className="flex-1 flex flex-col min-h-screen md:ml-64 relative w-full overflow-x-hidden">
                        <TopBar title={getDashboardTitle()} userRole={userRole} toggleRole={toggleRole} />
                        
                        <main className="flex-1 w-full">
                            {view === 'dashboard' && <DashboardHome navigate={navigate} />}
                            {view === 'pages' && <PagesView />}
                            {view === 'builder-wizard' && <BuilderWizard onComplete={() => navigate('pages')} />}
                            {view === 'catalog' && <CatalogView />}
                            {view === 'analytics' && <AnalyticsView />}
                            {view === 'admin-dashboard' && userRole === 'admin' && <AdminDashboard />}
                            
                            {view === 'settings' ? (
                                <div className="p-8 max-w-3xl mx-auto animate-slide-up">
                                    <h2 className="text-2xl font-bold mb-6">Pengaturan Profil</h2>
                                    <Card className="border-gray-200 shadow-sm space-y-6">
                                        <div className="flex items-center gap-4 border-b border-gray-100 pb-6">
                                            <div className="w-20 h-20 bg-gradient-to-tr from-skyblue to-skycyan rounded-full flex items-center justify-center text-white text-2xl font-bold">AD</div>
                                            <div>
                                                <h3 className="font-bold text-lg">Admin / User Default</h3>
                                                <p className="text-sm text-gray-500">user@skybuilder.id</p>
                                                <Badge type="warning" className="mt-2 text-[10px]">Paket PRO</Badge>
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-bold mb-2 text-gray-700">Nama Lengkap</label>
                                                <input type="text" className="w-full p-3 rounded-xl border border-gray-300 bg-gray-50 outline-none focus:border-skyblue" defaultValue="Pengguna Sky Builder" />
                                            </div>
                                            <Button variant="primary" className="shadow-none">Simpan Perubahan</Button>
                                        </div>
                                    </Card>
                                </div>
                            ) : null}
                        </main>
                        
                        {/* Only show bottom nav if not in builder wizard on mobile to give full screen to editor */}
                        {view !== 'builder-wizard' && <BottomNav activePath={view} navigate={navigate} />}
                    </div>
                </div>
            );
        };

        const AppWithProvider = () => (
            <ToastProvider>
                <App />
            </ToastProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppWithProvider />);
    </script>
</body>
</html>
